name: Build & Release CRONUX-CRX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v0.2.0)'
        required: true
        default: 'v0.2.0'

permissions:
  contents: write
  packages: write

jobs:

  # ── Linux: .deb CLI + GUI ──────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Configure Flutter
        run: |
          flutter config --no-analytics
          flutter precache --linux
          flutter doctor -v

      - name: Install Flet and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          sudo apt-get update
          sudo apt-get install -y dpkg-dev libgtk-3-dev

      - name: Build CLI .deb
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"

          # Estructura del paquete .deb
          mkdir -p deb-cli/DEBIAN
          mkdir -p deb-cli/usr/local/cronux/cli
          mkdir -p deb-cli/usr/local/bin

          # Copiar archivos CLI
          cp cronux_cli/cli/*.py deb-cli/usr/local/cronux/cli/

          # Script ejecutable
          cat > deb-cli/usr/local/cronux/cronux << 'EOF'
          #!/bin/bash
          python3 /usr/local/cronux/cli/cronux_cli.py "$@"
          EOF
          chmod +x deb-cli/usr/local/cronux/cronux
          ln -sf /usr/local/cronux/cronux deb-cli/usr/local/bin/cronux

          # Control file
          cat > deb-cli/DEBIAN/control << EOF
          Package: cronux-crx-cli
          Version: ${VERSION}
          Architecture: all
          Maintainer: CRONUX-CRX <contact@cronux.dev>
          Description: CRONUX-CRX CLI - Control de Versiones Local
          Depends: python3
          EOF

          dpkg-deb --build deb-cli "cronux-crx-cli_${VERSION}_all.deb"

      - name: Build GUI .deb
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"

          # Copiar módulos CLI a la carpeta UI para que Flet los incluya
          echo "📦 Copiando módulos CLI..."
          mkdir -p cronux_cli/ui/cli
          cp cronux_cli/cli/*.py cronux_cli/ui/cli/

          # Build GUI con Flet nativo
          cd cronux_cli/ui
          flet build linux \
            --module-name "cronux_ui_v2" \
            --product "CRONUX-CRX" \
            --project cronux-crx \
            --build-version "${VERSION}" \
            --build-number "${{ github.run_number }}" \
            --org "dev.cronux" \
            --bundle-id "dev.cronux.crx" \
            --description "Sistema de Control de Versiones Local" \
            --copyright "Copyright © 2024 CRONUX-CRX" \
            --yes \
            --no-rich-output
          
          # Listar estructura para encontrar el bundle
          echo "📂 Buscando bundle en build/linux:"
          ls -la build/linux/ || echo "No build/linux directory"
          
          cd ../..

          # El bundle está en build/linux/ directamente
          BUNDLE_DIR="cronux_cli/ui/build/linux"
          
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "❌ Bundle directory not found at $BUNDLE_DIR"
            echo "📂 Available directories:"
            find cronux_cli/ui/build -type d -maxdepth 2
            exit 1
          fi
          
          echo "✅ Bundle found: $BUNDLE_DIR"
          echo "📦 Bundle contents:"
          ls -lah "$BUNDLE_DIR/"
          
          # CRÍTICO: Copiar módulos CLI al bundle después del build
          echo "📦 Copiando módulos CLI al bundle..."
          mkdir -p "$BUNDLE_DIR/data/cli"
          cp cronux_cli/cli/*.py "$BUNDLE_DIR/data/cli/"
          echo "✅ Módulos CLI copiados:"
          ls -la "$BUNDLE_DIR/data/cli/"

          # Estructura del paquete .deb
          mkdir -p deb-gui/DEBIAN
          mkdir -p deb-gui/opt/cronux-crx
          mkdir -p deb-gui/usr/local/bin
          mkdir -p deb-gui/usr/share/applications
          mkdir -p deb-gui/usr/share/icons/hicolor/256x256/apps

          # Copiar el bundle completo
          echo "📦 Copiando bundle completo..."
          cp -r "$BUNDLE_DIR/"* deb-gui/opt/cronux-crx/
          
          # Verificar tamaño del bundle copiado
          echo "📊 Tamaño del bundle:"
          du -sh deb-gui/opt/cronux-crx/
          
          # Verificar que los módulos CLI estén en el paquete
          echo "🔍 Verificando módulos CLI en el paquete:"
          ls -la deb-gui/opt/cronux-crx/data/cli/ || echo "❌ Carpeta cli no encontrada"
          
          # Buscar el ejecutable principal
          EXEC_PATH=$(find deb-gui/opt/cronux-crx -maxdepth 1 -type f -executable -name "cronux-crx" 2>/dev/null | head -1)
          
          if [ -z "$EXEC_PATH" ]; then
            echo "⚠️  Ejecutable 'cronux-crx' no encontrado, buscando cualquier ejecutable..."
            EXEC_PATH=$(find deb-gui/opt/cronux-crx -maxdepth 1 -type f -executable 2>/dev/null | head -1)
          fi
          
          if [ -z "$EXEC_PATH" ]; then
            echo "❌ No se encontró ningún ejecutable"
            echo "📂 Contenido de /opt/cronux-crx:"
            ls -la deb-gui/opt/cronux-crx/
            exit 1
          fi
          
          EXEC_NAME=$(basename "$EXEC_PATH")
          echo "✅ Ejecutable encontrado: $EXEC_NAME"
          
          # Crear wrapper script en /usr/local/bin
          cat > deb-gui/usr/local/bin/cronux-crx-gui << 'WRAPPER_EOF'
          #!/bin/bash
          cd /opt/cronux-crx
          exec ./cronux-crx "$@"
          WRAPPER_EOF
          chmod +x deb-gui/usr/local/bin/cronux-crx-gui

          # Copiar icono
          if [ -f cronux_cli/assets/cronux_icon_256.png ]; then
            cp cronux_cli/assets/cronux_icon_256.png deb-gui/usr/share/icons/hicolor/256x256/apps/cronux-crx.png
          fi

          # Desktop entry
          cat > deb-gui/usr/share/applications/cronux-crx.desktop << EOF
          [Desktop Entry]
          Name=CRONUX-CRX
          Comment=Control de Versiones Local
          Exec=/usr/local/bin/cronux-crx-gui
          Icon=cronux-crx
          Terminal=false
          Type=Application
          Categories=Development;
          EOF

          # Control file
          cat > deb-gui/DEBIAN/control << EOF
          Package: cronux-crx-gui
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: CRONUX-CRX <contact@cronux.dev>
          Description: CRONUX-CRX GUI - Control de Versiones Local (Interfaz Gráfica)
          EOF

          dpkg-deb --build deb-gui "cronux-crx-gui_${VERSION}_amd64.deb"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: "*.deb"

  # ── macOS: .pkg CLI + .dmg GUI ────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Configure Flutter
        run: |
          flutter config --no-analytics
          flutter precache --macos
          flutter doctor -v

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build CLI .pkg
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"

          mkdir -p pkg-root/usr/local/cronux/cli
          mkdir -p pkg-root/usr/local/bin

          cp cronux_cli/cli/*.py pkg-root/usr/local/cronux/cli/

          cat > pkg-root/usr/local/cronux/cronux << 'EOF'
          #!/bin/bash
          python3 /usr/local/cronux/cli/cronux_cli.py "$@"
          EOF
          chmod +x pkg-root/usr/local/cronux/cronux
          ln -sf /usr/local/cronux/cronux pkg-root/usr/local/bin/cronux

          pkgbuild \
            --root pkg-root \
            --identifier dev.cronux.cli \
            --version "${VERSION}" \
            "Cronux-CRX-CLI-Installer.pkg"

      - name: Build GUI .app
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
        run: |
          # Copiar módulos CLI a la carpeta UI para que Flet los incluya
          echo "📦 Copiando módulos CLI..."
          mkdir -p cronux_cli/ui/cli
          cp cronux_cli/cli/*.py cronux_cli/ui/cli/
          
          cd cronux_cli/ui
          flet build macos \
            --module-name "cronux_ui_v2" \
            --product "CRONUX-CRX" \
            --project cronux-crx \
            --build-version "${{ github.ref_name || github.event.inputs.version }}" \
            --build-number "${{ github.run_number }}" \
            --org "dev.cronux" \
            --bundle-id "dev.cronux.crx" \
            --description "Sistema de Control de Versiones Local" \
            --copyright "Copyright © 2024 CRONUX-CRX" \
            --yes \
            --no-rich-output
          cd ../..

      - name: Find and sign app
        run: |
          APP_PATH=$(find cronux_cli/ui/build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "✅ App found: $APP_PATH"
            echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
            
            # Copiar icono personalizado de Cronux
            if [ -f "cronux_cli/assets/cronux_icon.icns" ]; then
              echo "📦 Copiando icono personalizado de Cronux..."
              cp cronux_cli/assets/cronux_icon.icns "$APP_PATH/Contents/Resources/app_icon.icns"
              echo "✅ Icono de Cronux copiado"
            else
              echo "⚠️  Icono cronux_icon.icns no encontrado, usando icono por defecto"
            fi
            
            # Ad-hoc signature
            codesign --force --deep --sign - "$APP_PATH"
            codesign --verify --deep --verbose=2 "$APP_PATH"
          else
            echo "❌ App not found"
            exit 1
          fi

      - name: Create .dmg
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          
          DMG_NAME="CRONUX-CRX-${VERSION}"
          DMG_DIR="dmg_staging"
          
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          
          hdiutil create -volname "CRONUX-CRX" -srcfolder "$DMG_DIR" -ov -format UDZO -imagekey zlib-level=9 "${DMG_NAME}.dmg"
          
          rm -rf "$DMG_DIR"
          echo "✅ DMG created: ${DMG_NAME}.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            *.pkg
            *.dmg

  # ── Windows: .exe CLI Installer + GUI ──────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Configure Flutter
        run: |
          flutter config --no-analytics
          flutter doctor -v

      - name: Install Flet and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pillow pyinstaller

      - name: Build CLI Installer .exe
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "CRONUX-CLI-INSTALLER" `
            --add-data "cronux_cli/cli;cli" `
            --add-data "cronux_cli/assets;assets" `
            --icon "cronux_cli/assets/cronux_icon.ico" `
            --clean `
            cronux_cli/installer_windows_cli.py

      - name: Build GUI with PyInstaller
        run: |
          # Copiar módulos CLI a la carpeta UI para que PyInstaller los incluya
          Write-Host "📦 Copiando módulos CLI..."
          New-Item -ItemType Directory -Force -Path "cronux_cli/ui/cli"
          Copy-Item "cronux_cli/cli/*.py" -Destination "cronux_cli/ui/cli/"
          
          Write-Host "📋 Verificando archivos copiados:"
          Get-ChildItem -Path "cronux_cli/ui/cli"
          Get-ChildItem -Path "cronux_cli/ui" -Filter "*.py"
          
          Write-Host "🔨 Building GUI with PyInstaller..."
          cd cronux_cli/ui
          
          # Usar --onedir primero para debugging (genera carpeta con todos los archivos)
          python -m PyInstaller `
            --onedir `
            --windowed `
            --name "CRONUX-CRX" `
            --add-data "cli_integration.py;." `
            --add-data "screens;screens" `
            --add-data "components;components" `
            --add-data "cli;cli" `
            --add-data "../assets;assets" `
            --icon "../assets/cronux_icon.ico" `
            --hidden-import "cli_integration" `
            --hidden-import "screens.home_screen" `
            --hidden-import "screens.wizard_screen" `
            --hidden-import "screens.project_screen_v2" `
            --hidden-import "components.terminal_loader" `
            --hidden-import "components.gradient_button" `
            --hidden-import "components.loader" `
            --hidden-import "components.project_type_card" `
            --hidden-import "cli.crear_proyecto" `
            --hidden-import "cli.guardar_version" `
            --hidden-import "cli.ver_historial" `
            --hidden-import "cli.restaurar_versiones" `
            --hidden-import "cli.info_proyecto" `
            --hidden-import "cli.funcion_verficar" `
            --hidden-import "cli.eliminar_proyecto" `
            --collect-all "flet" `
            --clean `
            cronux_ui_v2.py
          
          cd ../..
          
          # Verificar que se creó el directorio con el ejecutable
          if (Test-Path "cronux_cli/ui/dist/CRONUX-CRX/CRONUX-CRX.exe") {
            $size = (Get-Item "cronux_cli/ui/dist/CRONUX-CRX/CRONUX-CRX.exe").Length / 1MB
            Write-Host "✅ GUI executable created: $([math]::Round($size, 2)) MB"
            
            # Listar contenido del directorio para verificar
            Write-Host "📂 Contenido del directorio dist:"
            Get-ChildItem -Path "cronux_cli/ui/dist/CRONUX-CRX" | Select-Object Name, Length
            
            # Comprimir todo el directorio en un ZIP
            Write-Host "📦 Comprimiendo aplicación..."
            Compress-Archive -Path "cronux_cli/ui/dist/CRONUX-CRX/*" -DestinationPath "dist/CRONUX-CRX-Windows.zip" -Force
            
            # También copiar el exe solo para compatibilidad
            New-Item -ItemType Directory -Force -Path "dist"
            Copy-Item "cronux_cli/ui/dist/CRONUX-CRX/CRONUX-CRX.exe" -Destination "dist/"
          } else {
            Write-Host "❌ GUI executable not found"
            Write-Host "📂 Contenido de dist:"
            Get-ChildItem -Path "cronux_cli/ui/dist" -Recurse
            exit 1
          }
          
          # Verificar CLI installer
          if (Test-Path "dist/CRONUX-CLI-INSTALLER.exe") {
            Write-Host "✅ CLI installer found"
          } else {
            Write-Host "❌ CLI installer not found"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            dist/*.exe
            dist/*.zip

  # ── Release ────────────────────────────────────────────
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CRONUX-CRX ${{ github.ref_name }}"
          body: |
            ## CRONUX-CRX ${{ github.ref_name }}

            ### 🚀 Instalación rápida (CLI)

            **Linux/macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/eleodevv/CRONUX-CRX/${{ github.ref_name }}/cronux_cli/install.sh | bash
            ```

            **Windows (PowerShell como Admin):**
            ```powershell
            irm https://raw.githubusercontent.com/eleodevv/CRONUX-CRX/${{ github.ref_name }}/cronux_cli/install.ps1 | iex
            ```

            ### 📦 Descargas

            **CLI (Línea de comandos):**
            - `CRONUX-CLI-INSTALLER.exe` — Windows Installer
            - `cronux-crx-cli_*_all.deb` — Linux (Debian/Ubuntu)
            - `Cronux-CRX-CLI-Installer.pkg` — macOS

            **GUI (Interfaz gráfica):**
            - `CRONUX-CRX-Windows.zip` — Windows (aplicación completa con dependencias)
            - `CRONUX-CRX.exe` — Windows (ejecutable portable, requiere dependencias)
            - `cronux-crx-gui_*_amd64.deb` — Linux (Debian/Ubuntu)
            - `CRONUX-CRX-*.dmg` — macOS

            ### 🗑️ Desinstalar

            **Linux/macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/eleodevv/CRONUX-CRX/${{ github.ref_name }}/cronux_cli/uninstall.sh | bash
            ```

            **Windows (PowerShell como Admin):**
            ```powershell
            irm https://raw.githubusercontent.com/eleodevv/CRONUX-CRX/${{ github.ref_name }}/cronux_cli/uninstall.ps1 | iex
            ```
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.pkg
            artifacts/**/*.dmg
            cronux_cli/install.sh
            cronux_cli/install.ps1
            cronux_cli/uninstall.sh
            cronux_cli/uninstall.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
