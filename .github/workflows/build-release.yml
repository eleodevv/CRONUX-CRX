name: Build & Release CRONUX-CRX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v0.2.0)'
        required: true
        default: 'v0.2.0'

permissions:
  contents: write
  packages: write

jobs:

  # ── Linux: .deb CLI + GUI ──────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Configure Flutter
        run: |
          flutter config --no-analytics
          flutter precache --linux
          flutter doctor -v

      - name: Install Flet and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          sudo apt-get update
          sudo apt-get install -y dpkg-dev libgtk-3-dev

      - name: Build CLI .deb
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"

          # Estructura del paquete .deb
          mkdir -p deb-cli/DEBIAN
          mkdir -p deb-cli/usr/local/cronux/cli
          mkdir -p deb-cli/usr/local/bin

          # Copiar archivos CLI
          cp cronux_cli/cli/*.py deb-cli/usr/local/cronux/cli/

          # Script ejecutable
          cat > deb-cli/usr/local/cronux/cronux << 'EOF'
          #!/bin/bash
          python3 /usr/local/cronux/cli/cronux_cli.py "$@"
          EOF
          chmod +x deb-cli/usr/local/cronux/cronux
          ln -sf /usr/local/cronux/cronux deb-cli/usr/local/bin/cronux

          # Control file
          cat > deb-cli/DEBIAN/control << EOF
          Package: cronux-crx-cli
          Version: ${VERSION}
          Architecture: all
          Maintainer: CRONUX-CRX <contact@cronux.dev>
          Description: CRONUX-CRX CLI - Control de Versiones Local
          Depends: python3
          EOF

          dpkg-deb --build deb-cli "cronux-crx-cli_${VERSION}_all.deb"

      - name: Build GUI .deb
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"

          # Copiar módulos CLI a la carpeta UI para que Flet los incluya
          echo "📦 Copiando módulos CLI..."
          mkdir -p cronux_cli/ui/cli
          cp cronux_cli/cli/*.py cronux_cli/ui/cli/

          # Build GUI con Flet nativo
          cd cronux_cli/ui
          flet build linux \
            --module-name "cronux_ui_v2" \
            --product "CRONUX-CRX" \
            --project cronux-crx \
            --build-version "${VERSION}" \
            --build-number "${{ github.run_number }}" \
            --org "dev.cronux" \
            --bundle-id "dev.cronux.crx" \
            --description "Sistema de Control de Versiones Local" \
            --copyright "Copyright © 2024 CRONUX-CRX" \
            --yes \
            --no-rich-output
          
          # Listar estructura para encontrar el bundle
          echo "📂 Buscando bundle en build/linux:"
          ls -la build/linux/ || echo "No build/linux directory"
          
          cd ../..

          # El bundle está en build/linux/ directamente
          BUNDLE_DIR="cronux_cli/ui/build/linux"
          
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "❌ Bundle directory not found at $BUNDLE_DIR"
            echo "📂 Available directories:"
            find cronux_cli/ui/build -type d -maxdepth 2
            exit 1
          fi
          
          echo "✅ Bundle found: $BUNDLE_DIR"
          echo "📦 Bundle contents:"
          ls -lah "$BUNDLE_DIR/"

          # Estructura del paquete .deb
          mkdir -p deb-gui/DEBIAN
          mkdir -p deb-gui/opt/cronux-crx
          mkdir -p deb-gui/usr/local/bin
          mkdir -p deb-gui/usr/share/applications
          mkdir -p deb-gui/usr/share/icons/hicolor/256x256/apps

          # Copiar el bundle completo
          echo "📦 Copiando bundle completo..."
          cp -r "$BUNDLE_DIR/"* deb-gui/opt/cronux-crx/
          
          # Verificar tamaño del bundle copiado
          echo "📊 Tamaño del bundle:"
          du -sh deb-gui/opt/cronux-crx/
          
          # Buscar el ejecutable principal
          EXEC_PATH=$(find deb-gui/opt/cronux-crx -maxdepth 1 -type f -executable -name "cronux-crx" 2>/dev/null | head -1)
          
          if [ -z "$EXEC_PATH" ]; then
            echo "⚠️  Ejecutable 'cronux-crx' no encontrado, buscando cualquier ejecutable..."
            EXEC_PATH=$(find deb-gui/opt/cronux-crx -maxdepth 1 -type f -executable 2>/dev/null | head -1)
          fi
          
          if [ -z "$EXEC_PATH" ]; then
            echo "❌ No se encontró ningún ejecutable"
            echo "📂 Contenido de /opt/cronux-crx:"
            ls -la deb-gui/opt/cronux-crx/
            exit 1
          fi
          
          EXEC_NAME=$(basename "$EXEC_PATH")
          echo "✅ Ejecutable encontrado: $EXEC_NAME"
          
          # Crear wrapper script en /usr/local/bin
          cat > deb-gui/usr/local/bin/cronux-crx-gui << 'WRAPPER_EOF'
          #!/bin/bash
          cd /opt/cronux-crx
          exec ./cronux-crx "$@"
          WRAPPER_EOF
          chmod +x deb-gui/usr/local/bin/cronux-crx-gui

          # Copiar icono
          if [ -f cronux_cli/assets/cronux_icon_256.png ]; then
            cp cronux_cli/assets/cronux_icon_256.png deb-gui/usr/share/icons/hicolor/256x256/apps/cronux-crx.png
          fi

          # Desktop entry
          cat > deb-gui/usr/share/applications/cronux-crx.desktop << EOF
          [Desktop Entry]
          Name=CRONUX-CRX
          Comment=Control de Versiones Local
          Exec=/usr/local/bin/cronux-crx-gui
          Icon=cronux-crx
          Terminal=false
          Type=Application
          Categories=Development;
          EOF

          # Control file
          cat > deb-gui/DEBIAN/control << EOF
          Package: cronux-crx-gui
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: CRONUX-CRX <contact@cronux.dev>
          Description: CRONUX-CRX GUI - Control de Versiones Local (Interfaz Gráfica)
          EOF

          dpkg-deb --build deb-gui "cronux-crx-gui_${VERSION}_amd64.deb"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: "*.deb"

  # ── macOS: .pkg CLI + .dmg GUI ────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Configure Flutter
        run: |
          flutter config --no-analytics
          flutter precache --macos
          flutter doctor -v

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build CLI .pkg
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"

          mkdir -p pkg-root/usr/local/cronux/cli
          mkdir -p pkg-root/usr/local/bin

          cp cronux_cli/cli/*.py pkg-root/usr/local/cronux/cli/

          cat > pkg-root/usr/local/cronux/cronux << 'EOF'
          #!/bin/bash
          python3 /usr/local/cronux/cli/cronux_cli.py "$@"
          EOF
          chmod +x pkg-root/usr/local/cronux/cronux
          ln -sf /usr/local/cronux/cronux pkg-root/usr/local/bin/cronux

          pkgbuild \
            --root pkg-root \
            --identifier dev.cronux.cli \
            --version "${VERSION}" \
            "Cronux-CRX-CLI-Installer.pkg"

      - name: Build GUI .app
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
        run: |
          # Copiar módulos CLI a la carpeta UI para que Flet los incluya
          echo "📦 Copiando módulos CLI..."
          mkdir -p cronux_cli/ui/cli
          cp cronux_cli/cli/*.py cronux_cli/ui/cli/
          
          cd cronux_cli/ui
          flet build macos \
            --module-name "cronux_ui_v2" \
            --product "CRONUX-CRX" \
            --project cronux-crx \
            --build-version "${{ github.ref_name || github.event.inputs.version }}" \
            --build-number "${{ github.run_number }}" \
            --org "dev.cronux" \
            --bundle-id "dev.cronux.crx" \
            --description "Sistema de Control de Versiones Local" \
            --copyright "Copyright © 2024 CRONUX-CRX" \
            --yes \
            --no-rich-output
          cd ../..

      - name: Find and sign app
        run: |
          APP_PATH=$(find cronux_cli/ui/build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "✅ App found: $APP_PATH"
            echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
            # Ad-hoc signature
            codesign --force --deep --sign - "$APP_PATH"
            codesign --verify --deep --verbose=2 "$APP_PATH"
          else
            echo "❌ App not found"
            exit 1
          fi

      - name: Create .dmg
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          
          DMG_NAME="CRONUX-CRX-${VERSION}"
          DMG_DIR="dmg_staging"
          
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          
          hdiutil create -volname "CRONUX-CRX" -srcfolder "$DMG_DIR" -ov -format UDZO -imagekey zlib-level=9 "${DMG_NAME}.dmg"
          
          rm -rf "$DMG_DIR"
          echo "✅ DMG created: ${DMG_NAME}.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            *.pkg
            *.dmg

  # ── Windows: .exe CLI Installer + GUI ──────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Configure Flutter
        run: |
          flutter config --no-analytics
          flutter doctor -v

      - name: Install Flet and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pillow pyinstaller

      - name: Build CLI Installer .exe
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "CRONUX-CLI-INSTALLER" `
            --add-data "cronux_cli/cli;cli" `
            --add-data "cronux_cli/assets;assets" `
            --icon "cronux_cli/assets/cronux_icon.ico" `
            --clean `
            cronux_cli/installer_windows_cli.py

      - name: Build GUI .exe
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
        run: |
          # Copiar módulos CLI a la carpeta UI para que Flet los incluya
          Write-Host "📦 Copiando módulos CLI..."
          New-Item -ItemType Directory -Force -Path "cronux_cli/ui/cli"
          Copy-Item "cronux_cli/cli/*.py" -Destination "cronux_cli/ui/cli/"
          
          cd cronux_cli/ui
          flet build windows `
            --module-name "cronux_ui_v2" `
            --product "CRONUX-CRX" `
            --project cronux-crx `
            --build-version "${{ github.ref_name || github.event.inputs.version }}" `
            --build-number "${{ github.run_number }}" `
            --org "dev.cronux" `
            --bundle-id "dev.cronux.crx" `
            --description "Sistema de Control de Versiones Local" `
            --copyright "Copyright © 2024 CRONUX-CRX" `
            --yes `
            --no-rich-output
          cd ../..

      - name: Find and package executables
        run: |
          # Buscar el bundle completo de la GUI
          Write-Host "📂 Buscando bundle de Windows..."
          $buildDir = "cronux_cli/ui/build/windows"
          
          if (Test-Path $buildDir) {
            Write-Host "✅ Build directory found: $buildDir"
            Get-ChildItem -Path $buildDir -Recurse | Select-Object -First 20 | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "❌ Build directory not found"
            exit 1
          }
          
          # Buscar la carpeta del bundle (puede ser runner/Release o similar)
          $bundleDir = Get-ChildItem -Path $buildDir -Directory -Recurse | Where-Object { $_.Name -eq "Release" } | Select-Object -First 1
          
          if (-not $bundleDir) {
            Write-Host "⚠️  Release folder not found, searching for any folder with .exe..."
            $exeFile = Get-ChildItem -Path $buildDir -Filter "*.exe" -Recurse | Select-Object -First 1
            if ($exeFile) {
              $bundleDir = $exeFile.Directory
            }
          }
          
          if (-not $bundleDir) {
            Write-Host "❌ Bundle directory not found"
            exit 1
          }
          
          Write-Host "✅ Bundle found: $($bundleDir.FullName)"
          Write-Host "📦 Bundle contents:"
          Get-ChildItem -Path $bundleDir.FullName | ForEach-Object { Write-Host "  $($_.Name) - $([math]::Round($_.Length/1MB, 2)) MB" }
          
          # Crear directorio para el instalador
          New-Item -ItemType Directory -Force -Path "installer-files"
          Copy-Item -Path "$($bundleDir.FullName)/*" -Destination "installer-files/" -Recurse -Force
          
          # Buscar el ejecutable principal y renombrarlo
          $mainExe = Get-ChildItem -Path "installer-files" -Filter "*.exe" | Where-Object { $_.Name -notlike "*unins*" } | Select-Object -First 1
          
          if ($mainExe) {
            Write-Host "✅ Main executable: $($mainExe.Name)"
            Rename-Item -Path $mainExe.FullName -NewName "CRONUX-CRX.exe" -Force
          }
          
          # Copiar icono para el instalador
          Copy-Item "cronux_cli/assets/cronux_icon.ico" -Destination "installer-files/" -Force
          
          # Verificar que el CLI installer exista
          if (Test-Path "dist/CRONUX-CLI-INSTALLER.exe") {
            Write-Host "✅ CLI installer found"
          } else {
            Write-Host "❌ CLI installer not found"
            exit 1
          }

      - name: Create Inno Setup Script
        run: |
          $version = "${{ github.ref_name || github.event.inputs.version }}"
          $version = $version.TrimStart('v')
          
          $innoScript = @"
          #define MyAppName "CRONUX-CRX"
          #define MyAppVersion "$version"
          #define MyAppPublisher "CRONUX-CRX"
          #define MyAppURL "https://github.com/eleodevv/CRONUX-CRX"
          #define MyAppExeName "CRONUX-CRX.exe"

          [Setup]
          AppId={{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          AppPublisherURL={#MyAppURL}
          AppSupportURL={#MyAppURL}
          AppUpdatesURL={#MyAppURL}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          AllowNoIcons=yes
          LicenseFile=
          OutputDir=dist
          OutputBaseFilename=CRONUX-CRX-Setup
          SetupIconFile=installer-files\cronux_icon.ico
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesInstallIn64BitMode=x64

          [Languages]
          Name: "spanish"; MessagesFile: "compiler:Languages\Spanish.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "installer-files\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{group}\{cm:UninstallProgram,{#MyAppName}}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent
          "@

          $innoScript | Out-File -FilePath "installer.iss" -Encoding UTF8
          Write-Host "✅ Inno Setup script created"

      - name: Build Installer with Inno Setup
        run: |
          # Descargar e instalar Inno Setup
          Write-Host "📥 Downloading Inno Setup..."
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "innosetup.exe"
          
          Write-Host "📦 Installing Inno Setup..."
          Start-Process -FilePath "innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" -Wait
          
          Write-Host "🔨 Building installer..."
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"
          
          if (Test-Path "dist/CRONUX-CRX-Setup.exe") {
            $size = (Get-Item "dist/CRONUX-CRX-Setup.exe").Length / 1MB
            Write-Host "✅ Installer created: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "❌ Installer not created"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            dist/CRONUX-CLI-INSTALLER.exe
            dist/CRONUX-CRX-Setup.exe

  # ── Release ────────────────────────────────────────────
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CRONUX-CRX ${{ github.ref_name }}"
          body: |
            ## CRONUX-CRX ${{ github.ref_name }}

            ### 🚀 Instalación rápida (CLI)

            **Linux/macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/eleodevv/CRONUX-CRX/${{ github.ref_name }}/cronux_cli/install.sh | bash
            ```

            **Windows (PowerShell como Admin):**
            ```powershell
            irm https://raw.githubusercontent.com/eleodevv/CRONUX-CRX/${{ github.ref_name }}/cronux_cli/install.ps1 | iex
            ```

            ### 📦 Descargas

            **CLI (Línea de comandos):**
            - `CRONUX-CLI-INSTALLER.exe` — Windows Installer
            - `cronux-crx-cli_*_all.deb` — Linux (Debian/Ubuntu)
            - `Cronux-CRX-CLI-Installer.pkg` — macOS

            **GUI (Interfaz gráfica):**
            - `CRONUX-CRX-Setup.exe` — Windows Installer (recomendado)
            - `cronux-crx-gui_*_amd64.deb` — Linux (Debian/Ubuntu)
            - `CRONUX-CRX-*.dmg` — macOS

            ### 🗑️ Desinstalar

            **Linux/macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/eleodevv/CRONUX-CRX/${{ github.ref_name }}/cronux_cli/uninstall.sh | bash
            ```

            **Windows (PowerShell como Admin):**
            ```powershell
            irm https://raw.githubusercontent.com/eleodevv/CRONUX-CRX/${{ github.ref_name }}/cronux_cli/uninstall.ps1 | iex
            ```
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.pkg
            artifacts/**/*.dmg
            cronux_cli/install.sh
            cronux_cli/install.ps1
            cronux_cli/uninstall.sh
            cronux_cli/uninstall.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
